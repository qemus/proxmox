services:
  proxmox:
    hostname: pve
    image: dockurr/proxmox
    container_name: proxmox
    environment:
      PASSWORD: "root"
    ports:
      - 8006:8006
    volumes:
      - ./storage:/var/lib/vz
      - ./config:/var/lib/pve-cluster
      - /var/run/docker.sock:/var/run/docker.sock      
    restart: always
    privileged: true
    stop_grace_period: 2m
